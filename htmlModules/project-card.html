<!-- 
  Template: Project Card
  Description: This template defines the structure of a project card component using Material Web Components.
-->
<template id="projectCardTemplate">
  <md-elevated-card data-project-id="" class="project-card">
    <!-- Badge and labels -->
    <span class="academic-label"></span>
    
    <div class="badge-container">
      <div class="image-count-icon" style="display: none;">
        <md-icon>photo_library</md-icon>
        <span class="count"></span>
      </div>
      <div class="mermaid-icon" style="display: none;">
        <img src="./rsc/images/stack/MermaidJS.png" alt="Has Mermaid Diagram">
      </div>
    </div>

    <!-- Project content -->
    <div class="project-content">
      <md-headline class="project-title"></md-headline>
      <md-body class="short-form-truncated"></md-body>
    </div>

    <div class="stack-icons"></div>

    <div class="project-card-footer">
      <md-filled-tonal-button class="open-modal-btn">
        <md-icon slot="icon">visibility</md-icon>
        View Project
      </md-filled-tonal-button>
    </div>
  </md-elevated-card>
</template>

<template id="stackItemTemplate">
  <md-chip class="stack-icon"></md-chip>
</template>

<template id="moreStackTemplate">
  <md-text-button class="more-link"></md-text-button>
</template>
