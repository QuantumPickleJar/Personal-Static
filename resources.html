<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Resources & Reading</title><script src="https://cdn.jsdelivr.net/npm/@material/web/all.js"></script><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="style.css"><link rel="stylesheet" href="css/resources-page.css"><script>(function() {
      var isGithubPages = window.location.hostname.includes('github.io');
      if (isGithubPages) {
        var repoName = window.location.pathname.split('/')[1];
        document.write('<base href="/' + repoName + '/">');
      }
    })();</script><style>/* Material Design 3 CSS variables for light mode */

      --md-sys-color-surface: #fdf8fd;
      --md-sys-color-on-surface: #1c1b1f;
      --md-sys-color-surface-variant: #e7e0eb;
      --md-sys-color-on-surface-variant: #49454e;
      --md-sys-color-outline: #79747e;
      --md-sys-color-outline-variant: rgba(0, 0, 0, 0.08);
      --md-sys-color-surface-container: #f3f3f3;
    }
    
    /* Material Design 3 CSS variables for dark mode */
    body.dark-mode {
      --md-sys-color-primary: #d0bcff;
      --md-sys-color-on-primary: #381e72;
      --md-sys-color-primary-container: #4f378b;
      --md-sys-color-on-primary-container: #eaddff;
      --md-sys-color-surface: #1c1b1f;
      --md-sys-color-on-surface: #e6e0e9;
      --md-sys-color-surface-variant: #49454f;
      --md-sys-color-on-surface-variant: #cac4d0;
      --md-sys-color-outline: #938f99;
      --md-sys-color-outline-variant: rgba(255, 255, 255, 0.1);
      --md-sys-color-surface-container: #1d1b20;
      --md-sys-color-surface-container-high: #2b2930;
      background-color: var(--md-sys-color-surface);
      color: var(--md-sys-color-on-surface);
    }

    /* Ensure theme-toggle is always visible */
    theme-toggle {
      position: fixed !important;
      top: 1.25rem !important;
      right: 1.25rem !important;
      z-index: 9999 !important;
      display: block !important;
      width: auto !important;
      height: auto !important;
      opacity: 1 !important;
      pointer-events: auto !important;
      background: rgba(255, 255, 255, 0.8) !important;
      border-radius: 20px !important;
      padding: 4px !important;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2) !important;
    }

    body.dark-mode theme-toggle {
      background: rgba(30, 30, 30, 0.8) !important;
    }</style><script defer="defer" src="main.bundle.js"></script></head><body><div id="navDrawerContainer"></div><theme-toggle></theme-toggle><div class="barba-wrapper" data-barba="wrapper"><div data-barba="container" data-barba-namespace="resources"><div id="headerContainer"></div><div class="contentContainer"><div id="sidebarContainer"></div><div id="mainContainer"><main id="mainContent"><section id="booksSection" class="section-books"><h1 class="section-title">Books I've Been Reading Recently</h1><div id="booksContainer" class="books-container"><div class="loading">Loading books...</div></div></section><hr class="section-divider"/><section id="bookmarksSection" class="section-bookmarks"><h1 class="section-title">Bookmarks</h1><div class="bookmark-controls"><label for="bookmarkCategory" class="bookmark-label">Choose a category:</label> <select id="bookmarkCategory" class="bookmark-select"></select></div><div id="bookmarksContainer" class="bookmarks-container"></div></section><div id="resumeModal" class="modal"><div class="modal-content"><span class="close-modal">&times;</span><div id="loadingIndicator">Loading Resume...</div><canvas id="resumeCanvas" style="display:none"></canvas><div id="fallbackMessage" style="display:none"><p>Unable to load resume. <a href="rsc/docs/resume.pdf" target="_blank">Download PDF</a></p></div><button id="zoomInBtn">Zoom In</button> <button id="zoomOutBtn">Zoom Out</button></div></div></main></div></div><div id="footerContainer"></div></div></div><script>// DOMContentLoaded listener that handles everything
    document.addEventListener('DOMContentLoaded', async function() {
      console.log('Resources page DOM loaded');
      
      // Force-load the partials directly
      const basePath = window.location.hostname.includes('github.io') ? 
        '/Personal-Static/' : '/';
      
      // Load all partials first
      const partials = [
        { id: 'headerContainer', path: 'header.html' },
        { id: 'sidebarContainer', path: 'sidebar.html' },
        { id: 'footerContainer', path: 'footer.html' }
      ];
      
      // Load partials
      for (const partial of partials) {
        try {
          // First try using window.loadPartial if available
          if (typeof window.loadPartial === 'function') {
            await window.loadPartial(partial.id, partial.path);
          } else {
            // Fallback to direct fetch
            const url = basePath + 'partials/' + partial.path;
            console.log('Fetching partial from:', url);
            const response = await fetch(url, { cache: 'no-store' });
            
            if (response.ok) {
              const html = await response.text();
              document.getElementById(partial.id).innerHTML = html;
            } else {
              throw new Error(`HTTP error ${response.status}`);
            }
          }
          console.log(`Successfully loaded partial: ${partial.path}`);
        } catch (err) {
          console.error(`Failed to load partial ${partial.path}:`, err);
          document.getElementById(partial.id).innerHTML = 
            `<div class="error-partial">Failed to load ${partial.path}. Error: ${err.message}</div>`;
        }
      }
      
      // Check for saved theme preference
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'dark') {
        document.body.classList.add('dark-mode');
      }
      
      // Load books data
      try {
        const bookResponse = await fetch(`${basePath}rsc/json/books.json`);
        if (!bookResponse.ok) throw new Error(`Books JSON not found (${bookResponse.status})`);
        
        const books = await bookResponse.json();
        console.log('Books loaded:', books.length);
        
        const booksContainer = document.getElementById('booksContainer');
        if (booksContainer) {
          if (books.length === 0) {
            booksContainer.innerHTML = '<div class="no-data">No books available.</div>';
          } else {
            booksContainer.innerHTML = books.map(book => `
              <div class="book-item">
                <img src="${basePath}${book.cover ? book.cover.replace(/^\//, '') : 'rsc/images/placeholder-book.png'}" 
                     alt="${book.title || 'Untitled Book'}" class="book-cover">
                <div class="book-details">
                  <h3 class="book-title">${book.title || 'Untitled'}</h3>
                  <p class="book-author">${book.author || 'Unknown Author'}</p>
                  <p class="book-description">${book.description || 'No description available.'}</p>
                </div>
              </div>
            `).join('');
          }
        }
      } catch (err) {
        console.error('Failed to load books:', err);
        document.getElementById('booksContainer').innerHTML = 
          `<div class="error">Failed to load books: ${err.message}</div>`;
      }
      
      // Also load bookmarks if that feature is ready
      try {
        // Instead of loading bookmarks directly here, we'll just make sure the container exists
        // The actual loading will be handled by bookmarks.js
        if (!document.getElementById('bookmarksContainer')) {
          console.error('Bookmarks container not found');
        } else {
          console.log('Bookmarks container found, loading will be handled by bookmarks.js');
          // We'll add a small helper for bookmarks.js to use the correct base path
          window.bookmarksBasePath = basePath;
        }
      } catch (err) {
        console.error('Error setting up bookmarks:', err);
        document.getElementById('bookmarksContainer').innerHTML = 
          `<div class="error">Failed to set up bookmarks: ${err.message}</div>`;
      }
    });</script><script>// Improved footer positioning function
  function adjustFooterPosition() {
    const footerContainer = document.getElementById('footerContainer');
    const contentContainer = document.querySelector('.contentContainer');
    const mainContent = document.getElementById('mainContent');
    const viewportHeight = window.innerHeight;
    
    // Reset any previously set margin
    footerContainer.style.marginTop = '';
    
    // Get heights after resetting margin
    const contentHeight = contentContainer.offsetHeight;
    const mainContentHeight = mainContent.offsetHeight;
    const headerHeight = document.getElementById('headerContainer').offsetHeight;
    const footerHeight = footerContainer.offsetHeight;
    
    // Calculate space available
    const availableSpace = viewportHeight - headerHeight;
    const contentWithoutFooter = mainContentHeight + 40; // Add some buffer
    
    // Only adjust if content is shorter than available space
    if (contentWithoutFooter < availableSpace - footerHeight) {
      // Calculate margin needed to push footer to bottom
      const marginNeeded = availableSpace - contentWithoutFooter - footerHeight;
      footerContainer.style.marginTop = Math.max(20, marginNeeded) + 'px';
    }
  }

  // Call on load and resize
  window.addEventListener('load', adjustFooterPosition);
  window.addEventListener('resize', adjustFooterPosition);
  
  // Also check after content loads with images
  window.addEventListener('DOMContentLoaded', function() {
    // Add initial timeout for partial loading
    setTimeout(adjustFooterPosition, 300);
    
    // Check again after all images load
    window.addEventListener('load', function() {
      // Wait a bit for any dynamic content to settle
      setTimeout(adjustFooterPosition, 500);
    });
  });</script><script src="rsc/js/bookmarks.js"></script><script type="module" src="rsc/js/theme-toggle.js"></script><script>// Load nav drawer component
  document.addEventListener('DOMContentLoaded', function() {
    fetch('htmlModules/nav-drawer.html')
      .then(response => response.text())
      .then(html => {
        document.getElementById('navDrawerContainer').innerHTML = html;
      })
      .catch(error => console.error('Error loading nav drawer:', error));
  });</script><script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.10.377/pdf.min.js"></script><script>(function() {
          let isRendering = false;
          let pendingScale = null;
          let pdfDoc = null, page = null, renderTask = null, scale = 1;
          const modal = document.getElementById('resumeModal');
          const canvas = document.getElementById('resumeCanvas');
          const ctx = canvas.getContext('2d');
          const loadingEl = document.getElementById('loadingIndicator');
          const fallbackEl = document.getElementById('fallbackMessage');

          async function initPdf() {
            loadingEl.style.display = '';
            fallbackEl.style.display = 'none';
            if (!pdfDoc) {
              pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.10.377/pdf.min.js';
              try {
                pdfDoc = await pdfjsLib.getDocument('rsc/docs/resume.pdf').promise;
                page = await pdfDoc.getPage(1);
              } catch (err) {
                loadingEl.style.display = 'none';
                fallbackEl.style.display = '';
                throw err;
              }
            }
          }

          async function renderPage() {
            if (isRendering) return;
            isRendering = true;
            loadingEl.style.display = '';
            if (!page) return;
            const viewport = page.getViewport({ scale });
            canvas.width = viewport.width;
            canvas.height = viewport.height;
            if (renderTask) {
              renderTask.cancel();
              try { await renderTask.promise; } catch {};
            }
            renderTask = page.render({ canvasContext: ctx, viewport });
            try {
              await renderTask.promise;
              canvas.style.display = '';
            } catch {
              fallbackEl.style.display = '';
            } finally {
              loadingEl.style.display = 'none';
              renderTask = null;
              isRendering = false;
              if (pendingScale !== null) {
                scale = pendingScale;
                pendingScale = null;
                queueRenderPage();
              }
            }
          }

          function queueRenderPage() {
            if (isRendering) {
              pendingScale = scale;
            } else {
              renderPage();
            }
          }

          document.body.addEventListener('click', async e => {
            if (e.target.id === 'viewResumeBtn') {
              modal.style.display = 'flex';
              scale = 1;
              await initPdf();
              queueRenderPage();
            } else if (e.target.id === 'zoomInBtn') {
              scale = Math.min(scale + 0.25, 3);
              queueRenderPage();
            } else if (e.target.id === 'zoomOutBtn') {
              scale = Math.max(scale - 0.25, 0.5);
              queueRenderPage();
            } else if (e.target.classList.contains('close-modal') || e.target === modal) {
              modal.style.display = 'none';
            }
          });
        })();</script></body></html>
