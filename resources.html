<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Resources & Reading</title><script src="https://cdn.jsdelivr.net/npm/@material/web/all.js"></script><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="style.css"><link rel="stylesheet" href="css/resources-page.css"><script>(function() {
      var isGithubPages = window.location.hostname.includes('github.io');
      if (isGithubPages) {
        var repoName = window.location.pathname.split('/')[1];
        document.write('<base href="/' + repoName + '/">');
      }
    })();</script><style>/* Material Design 3 CSS variables for light mode */
    :root {
      --md-sys-color-primary: #6750a4;
      --md-sys-color-on-primary: #ffffff;
      --md-sys-color-primary-container: #eaddff;
      --md-ssys-color-on-primary-container: #21005d;
      --md-sys-color-surface: #fdf8fd;
      --md-sys-color-on-surface: #1c1b1f;
      --md-sys-color-surface-variant: #e7e0eb;
      --md-sys-color-on-surface-variant: #49454e;
      --md-sys-color-outline: #79747e;
      --md-sys-color-outline-variant: rgba(0, 0, 0, 0.08);
      --md-sys-color-surface-container: #f3f3f3;
    }
    
    /* Material Design 3 CSS variables for dark mode */
    body.dark-mode {
      --md-sys-color-primary: #d0bcff;
      --md-sys-color-on-primary: #381e72;
      --md-sys-color-primary-container: #4f378b;
      --md-sys-color-on-primary-container: #eaddff;
      --md-sys-color-surface: #2b2b2b;
      --md-sys-color-on-surface: #e6e0e9;
      --md-sys-color-surface-variant: #49454f;
      --md-sys-color-on-surface-variant: #cac4d0;
      --md-sys-color-outline: #938f99;
      --md-sys-color-outline-variant: rgba(255, 255, 255, 0.1);
      --md-sys-color-surface-container: #343434;
      --md-sys-color-surface-container-high: #3f3f3f;
      background-color: var(--md-sys-color-surface);
      color: var(--md-sys-color-on-surface);
    }

    /* Ensure theme-toggle is always visible */
    theme-toggle {
      position: fixed !important;
      top: 1.25rem !important;
      right: 1.25rem !important;
      z-index: 9999 !important;
      display: block !important;
      width: auto !important;
      height: auto !important;
      opacity: 1 !important;
      pointer-events: auto !important;
      background: rgba(255, 255, 255, 0.8) !important;
      border-radius: 20px !important;
      padding: 4px !important;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2) !important;
    }

    body.dark-mode theme-toggle {
      background: rgba(30, 30, 30, 0.8) !important;
    }</style><script defer="defer" src="main.bundle.js"></script></head><body><div id="navDrawerContainer"></div><theme-toggle></theme-toggle><div class="barba-wrapper" data-barba="wrapper"><div data-barba="container" data-barba-namespace="resources"><div id="headerContainer"></div><div class="contentContainer"><div id="sidebarContainer"></div><div id="mainContainer"><main id="mainContent"><section id="booksSection" class="section-books"><h1 class="section-title">Books I've Been Reading Recently</h1><div id="booksContainer" class="books-container"><div class="loading">Loading books...</div></div></section><hr class="section-divider"/><section id="bookmarksSection" class="section-bookmarks"><h1 class="section-title">Bookmarks</h1><div class="bookmark-controls"><label for="bookmarkCategory" class="bookmark-label">Choose a category:</label> <select id="bookmarkCategory" class="bookmark-select"></select></div><div id="bookmarksContainer" class="bookmarks-container"></div></section><div id="resumeModal" class="modal"><div class="modal-content"><span class="close-modal">&times;</span><div id="loadingIndicator">Loading Resume...</div><canvas id="resumeCanvas" style="display:none"></canvas><div id="fallbackMessage" style="display:none"><p>Unable to load resume. <a href="rsc/docs/resume.pdf?v=2026-02-16-latest" target="_blank" rel="noopener">Download PDF</a></p></div><button id="zoomInBtn">Zoom In</button> <button id="zoomOutBtn">Zoom Out</button></div></div></main></div></div><div id="footerContainer"></div></div></div><script>// DOMContentLoaded listener that handles everything
    document.addEventListener('DOMContentLoaded', async function() {
      console.log('Resources page DOM loaded');
      
      // Force-load the partials directly
      const basePath = window.location.hostname.includes('github.io') ? 
        '/Personal-Static/' : '/';
      
      // Load all partials first
      const partials = [
        { id: 'headerContainer', path: 'header.html' },
        { id: 'sidebarContainer', path: 'sidebar.html' },
        { id: 'footerContainer', path: 'footer.html' }
      ];
      
      // Load partials
      for (const partial of partials) {
        try {
          // First try using window.loadPartial if available
          if (typeof window.loadPartial === 'function') {
            await window.loadPartial(partial.id, partial.path);
          } else {
            // Fallback to direct fetch
            const url = basePath + 'partials/' + partial.path;
            console.log('Fetching partial from:', url);
            const response = await fetch(url, { cache: 'no-store' });
            
            if (response.ok) {
              const html = await response.text();
              const el = document.getElementById(partial.id);
              el.innerHTML = html;
              const yr = new Date().getFullYear();
              el.querySelectorAll('[data-current-year]').forEach(n => { n.textContent = String(yr); });
            } else {
              throw new Error(`HTTP error ${response.status}`);
            }
          }
          console.log(`Successfully loaded partial: ${partial.path}`);
        } catch (err) {
          console.error(`Failed to load partial ${partial.path}:`, err);
          document.getElementById(partial.id).innerHTML = 
            `<div class="error-partial">Failed to load ${partial.path}. Error: ${err.message}</div>`;
        }
      }
      
      // Check for saved theme preference
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'dark') {
        document.body.classList.add('dark-mode');
      }
      
      // Load books data
      try {
        const bookResponse = await fetch(`${basePath}rsc/json/books.json`);
        if (!bookResponse.ok) throw new Error(`Books JSON not found (${bookResponse.status})`);
        
        const books = await bookResponse.json();
        console.log('Books loaded:', books.length);
        
        const booksContainer = document.getElementById('booksContainer');
        if (booksContainer) {
          if (books.length === 0) {
            booksContainer.innerHTML = '<div class="no-data">No books available.</div>';
          } else {
            booksContainer.innerHTML = books.map(book => `
              <div class="book-item">
                <img src="${basePath}${book.cover ? book.cover.replace(/^\//, '') : 'rsc/images/placeholder-book.png'}" 
                     alt="${book.title || 'Book cover'}" 
                     onerror="this.onerror=null; this.src='https://placehold.co/150x220?text=No+Cover';" />
                <div class="book-info">
                  <h2>${book.title || 'Untitled'}</h2>
                  <p class="author">by ${book.author || 'Unknown Author'}</p>
                  <p>${book.description || ''}</p>
                </div>
              </div>
            `).join('');
          }
        }
      } catch (err) {
        console.error('Error loading books:', err);
        const booksContainer = document.getElementById('booksContainer');
        if (booksContainer) {
          booksContainer.innerHTML = `<div class="error-message">Failed to load books: ${err.message}</div>`;
        }
      }

      // Load bookmarks data
      try {
        const bookmarkResponse = await fetch(`${basePath}rsc/json/bookmarks.json`);
        if (!bookmarkResponse.ok) throw new Error(`Bookmarks JSON not found (${bookmarkResponse.status})`);
        
        const bookmarks = await bookmarkResponse.json();
        console.log('Bookmarks loaded:', bookmarks.length);
        
        const categorySelect = document.getElementById('bookmarkCategory');
        const bookmarksContainer = document.getElementById('bookmarksContainer');
        
        if (categorySelect && bookmarksContainer) {
          const categories = [...new Set(bookmarks.map(b => b.category || 'Uncategorized'))];
          categories.forEach(cat => {
            const opt = document.createElement('option');
            opt.value = cat;
            opt.textContent = cat;
            categorySelect.appendChild(opt);
          });
          
          function renderBookmarks(category) {
            const filtered = bookmarks.filter(b => (b.category || 'Uncategorized') === category);
            bookmarksContainer.innerHTML = filtered.length === 0
              ? '<div class="no-data">No bookmarks in this category.</div>'
              : filtered.map(b => `
                <div class="bookmark-item">
                  <a href="${b.url}" target="_blank" rel="noopener">${b.title || b.url}</a>
                  ${b.description ? `<p>${b.description}</p>` : ''}
                </div>
              `).join('');
          }
          
          if (categories.length > 0) {
            renderBookmarks(categories[0]);
            categorySelect.addEventListener('change', e => renderBookmarks(e.target.value));
          }
        }
      } catch (err) {
        console.error('Error loading bookmarks:', err);
        const bookmarksContainer = document.getElementById('bookmarksContainer');
        if (bookmarksContainer) {
          bookmarksContainer.innerHTML = `<div class="error-message">Failed to load bookmarks: ${err.message}</div>`;
        }
      }
    });</script><script type="module" src="rsc/js/theme-toggle.js"></script><script src="transition.js"></script></body></html>
