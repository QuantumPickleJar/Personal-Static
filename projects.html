<!DOCTYPE html>
<html lang="en">

  <head>
  <script src="https://cdn.jsdelivr.net/npm/@material/web/all.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Add this script to dynamically set the correct base -->
  <script>
    // Detect if we're on GitHub Pages and set the correct base path
    const isGitHubPages = window.location.hostname.includes('github.io');
    if (isGitHubPages) {
      const basePath = '/Personal-Static/';
      document.write(`<base href="${basePath}">`);
    } else {
      document.write('<base href="/">');
    }
  </script>

  <title>Vincent's Portfolio</title>
  <!-- Material Icons -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

  <!-- Updated CSS path -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.3/css/lightbox.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.3/js/lightbox.min.js"></script>  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="style.css">
  <script type="module">
  // Dynamically import with absolute path
  const basePath = window.location.hostname.includes('github.io') ? 
    '/Personal-Static/' : '/';
  
  import(`${basePath}rsc/js/projects.js`)
    .catch(err => console.error('Failed to load projects module:', err));
</script>
  <!-- Add Barba.js CDN -->
  <meta http-equiv="Content-Type" content="text/javascript; charset=utf-8">
  <script src="https://unpkg.com/@barba/core"></script>

  <style>
    /* CSS-only Material Menu Implementation */
    .custom-material-menu {
      position: absolute;
      top: 100%;
      left: 0;
      z-index: 1000;
      display: none;
      min-width: 180px;
      padding: 8px 0;
      margin: 0;
      font-size: 14px;
      text-align: left;
      list-style: none;
      background-color: #fff;
      background-clip: padding-box;
      border: 0;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.10);
    }

    .dark-theme .custom-material-menu {
      background-color: #333;
      color: #fff;
    }

    .custom-menu-item {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      clear: both;
      font-weight: 400;
      line-height: 1.5;
      white-space: nowrap;
      cursor: pointer;
      transition: background-color 0.15s ease-in-out;
    }

    .custom-menu-item:hover {
      background-color: rgba(0, 0, 0, 0.04);
    }

    .dark-theme .custom-menu-item:hover {
      background-color: rgba(255, 255, 255, 0.1);
    }

    .custom-menu-item.selected::before {
      content: '✓';
      margin-right: 8px;
    }

    .custom-menu-divider {
      height: 1px;
      margin: 8px 0;
      overflow: hidden;
      background-color: rgba(0, 0, 0, 0.12);
    }

    .dark-theme .custom-menu-divider {
      background-color: rgba(255, 255, 255, 0.12);
    }

    .filter-menu-section {
      padding: 10px;
      max-width: 250px;
    }
    
    .custom-material-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 16px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      line-height: 1.5;
      text-align: center;
      text-decoration: none;
      background-color: #e6e6e6;
      color: #000;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      transition: background-color 0.2s, box-shadow 0.2s;
      user-select: none;
      position: relative;
      overflow: hidden;
    }

    .custom-material-button:hover {
      background-color: #d6d6d6;
    }

    .custom-material-button:active {
      background-color: #c6c6c6;
    }

    .dark-theme .custom-material-button {
      background-color: #3a3a3a;
      color: #fff;
    }

    .dark-theme .custom-material-button:hover {
      background-color: #4a4a4a;
    }

    .dark-theme .custom-material-button:active {
      background-color: #5a5a5a;
    }
    
    /* Tech filter card styles */
    .filter-menu-container {
      display: flex;
      position: relative;
    }
    
    .filter-menu-main {
      min-width: 180px;
    }
    
    .tech-filter-card {
      position: absolute;
      left: 100%;
      top: 0;
      margin-left: 8px;
      width: 200px;
      max-height: 300px;
      background-color: #fff;
      border-radius: 8px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      display: none;
      flex-direction: column;
      overflow: hidden;
    }
    
    .dark-theme .tech-filter-card {
      background-color: #333;
    }
    
    .tech-filter-header {
      padding: 12px 16px;
      font-weight: 500;
      border-bottom: 1px solid rgba(0, 0, 0, 0.1);
      background-color: #f5f5f5;
    }
    
    .dark-theme .tech-filter-header {
      background-color: #444;
      border-bottom-color: rgba(255, 255, 255, 0.1);
    }
    
    .tech-filter-content {
      padding: 8px;
      overflow-y: auto;
      max-height: 250px;
      display: flex;
      flex-wrap: wrap;
      align-content: flex-start;
      gap: 6px;
    }
    
    .tech-filter-card.visible {
      display: flex;
    }
    
    /* Chip styles */
    .custom-filter-chip {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 16px;
      font-size: 12px;
      font-weight: 500;
      background-color: #e0e0e0;
      color: #333;
      cursor: pointer;
      transition: all 0.2s;
      user-select: none;
      border: 1px solid transparent;
      white-space: nowrap;
    }
    
    .custom-filter-chip:hover {
      background-color: #d0d0d0;
    }
    
    .custom-filter-chip.selected {
      background-color: var(--md-sys-color-primary-container, #c8e6fa);
      color: var(--md-sys-color-on-primary-container, #001f28);
      border-color: var(--md-sys-color-primary, #006782);
    }
    
    .dark-theme .custom-filter-chip {
      background-color: #3a3a3a;
      color: #e0e0e0;
    }
    
    .dark-theme .custom-filter-chip:hover {
      background-color: #4a4a4a;
    }
    
    .dark-theme .custom-filter-chip.selected {
      background-color: var(--md-sys-color-primary, #5bd3fc);
      color: var(--md-sys-color-on-primary, #003546);
    }
    
    /* Selected indicator */
    .custom-filter-chip.selected::before {
      content: '✓';
      margin-right: 4px;
      font-size: 10px;
    }
    
    /* Show tech filter card on hover */
    .filter-tech-trigger:hover + .tech-filter-card,
    .tech-filter-card:hover {
      display: flex;
    }

    /* Ensure theme-toggle is always visible */
    theme-toggle {
      position: fixed !important;
      top: 1.25rem !important;
      right: 1.25rem !important;
      z-index: 9999 !important; /* Extremely high z-index to ensure visibility */
      display: block !important;
      width: auto !important;
      height: auto !important;
      opacity: 1 !important;
      pointer-events: auto !important;
      background: rgba(255, 255, 255, 0.8);
      border-radius: 20px;
      padding: 4px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
    }
  </style>
</head>

<body>
  <!-- Load Navigation Drawer HTML Component -->
  <div id="navDrawerContainer"></div>
  
  <!-- Theme Toggle (shows the dark/light mode slider)-->
  <theme-toggle></theme-toggle>
  
  <!-- Wrap with Barba containers -->
  <div id="barba-wrapper" data-barba="wrapper">
    <div data-barba="container" data-barba-namespace="projects">
      <!-- Header partial -->
      <div id="headerContainer"></div>

      <!-- Main sandwich container -->
      <div class="contentContainer">
        <!-- Sidebar partial -->
        <div id="sidebarContainer"></div>

        <!-- Main Container -->
        <div id="mainContainer">
          <main id="mainContent">
            <!-- New row for how-to and projects per page dropdown -->
            <div id="how-to" class="how-to d-flex align-items-center justify-content-between flex-wrap">
              <p class="mb-0">
                Below are projects that have enough of a footprint to warrant a listing here.<br>
                <strong>Mouseover</strong> descriptions that are truncated, and click to see more info
              </p>
              <div id="perPageContainer" class="per-page-container"></div>
            </div>

            <div id="advancedSearchContainer" class="d-flex align-items-center gap-2 mb-3">
              <div class="d-flex align-items-center gap-2">
                <div>
                  <label for="searchBar" class="visually-hidden">Search Projects:</label>
                  <input type="text" id="searchBar" placeholder="Search Projects..." class="form-control">
                </div>
 
                <!-- filter by dropdown -->
                <div id="projectFilters" style="display: flex; flex-wrap: wrap; gap: 1rem; align-items: center; margin-bottom: 1rem;">
                  <!-- Anchor for menu with proper positioning -->
                  <div id="filterMenuAnchor" style="position: relative;">
                    <!-- Replace md-filled-tonal-button with regular button styled with CSS -->
                    <button id="filterToggleBtn" class="custom-material-button">Filter Options</button>
                    
                    <!-- CSS-only menu implementation with right-side tech filter card -->
                    <div id="projectFilterMenu" class="custom-material-menu">
                      <div class="filter-menu-container">
                        <!-- Main menu items -->
                        <div class="filter-menu-main">
                          <div id="filterImages" class="custom-menu-item" data-type="checkbox">Has Images</div>
                          <div id="filterMermaid" class="custom-menu-item" data-type="checkbox">Has Mermaid</div>
                          <div class="custom-menu-divider"></div>
                          <!-- Tech filter trigger item that shows the tech filter card -->
                          <div id="filterTechTrigger" class="custom-menu-item filter-tech-trigger">
                            Filter by Technology <span style="margin-left: auto">▶</span>
                          </div>
                        </div>
                        
                        <!-- Right-side tech filter card with vertical scroll -->
                        <div id="techFilterCard" class="tech-filter-card">
                          <div class="tech-filter-header">Technologies</div>
                          <div id="stackFilterChips" class="tech-filter-content"></div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
                
              </div>
              <!-- Inline pagination for larger screens -->
              <div id="inlinePaginationContainer"></div>
            </div>
            <!-- The projects gallery container now includes the loading overlay -->
            <div id="projectsGallery" class="projects-gallery">
              <div id="loadingOverlay">Loading</div>
            </div>

            <!-- Bottom pagination for small screens -->
            <div id="paginationContainer"></div>
          </main>
        </div>
      </div>

      <!-- Footer partial -->
      <div id="footerContainer"></div>

      <!-- Modal for expanded project details -->
      <div id="modalContainer"></div>

      <script type="module">
        // Load the modal HTML
        fetch('htmlModules/project-modal.html')
          .then(response => response.text())
          .then(html => {
            document.getElementById('modalContainer').innerHTML = html;

            // Now that modal is injected, bind close button listener
            const closeButton = document.getElementById('closeModal');
            if (closeButton) {
              closeButton.addEventListener('click', () => {
                document.getElementById('projectModal').style.display = 'none';
              });
            }
          });

      </script>
    </div>
  
    <template id="projectCardTemplate">
      <md-elevated-card data-project-id="" class="project-card">
        <div class="badge-container">
          <span class="academic-label"></span>
          <div class="image-count-icon" style="display: none;">
            <span class="icon">&#128247;</span>
            <span class="count"></span>
          </div>
          <div class="mermaid-icon" style="display: none;">
            <img src="./rsc/images/stack/MermaidJS.png" alt="Has Mermaid Diagram" />
          </div>
        </div>
    
        <!-- <img class="project-thumbnail" src="" alt="Project Thumbnail" /> -->
    
        <div class="project-title"></div>
    
        <span class="short-form-truncated"></span>
    
        <div class="stack-icons"></div>
    
        <div class="carousel-card-footer">
          <md-filled-button class="open-modal-btn">View Project</md-filled-button>
        </div>
      </md-elevated-card>
    </template>
    
  </div>

  <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
  <script>
    mermaid.initialize({ startOnLoad: false });
  </script>
  
  <!-- Transition script -->
  <script src="transition.js"></script>
  
  <!-- Include only the entry point as module -->
  <script type="module" src="main.js"></script>
  
  <!-- Add theme toggle script -->
  <script type="module" src="./rsc/js/theme-toggle.js"></script>

  <script>
    console.log('projects.html page loaded');
    document.addEventListener('DOMContentLoaded', () => {
      console.log('DOM fully loaded in projects.html');
      window.debugProjectsPage = true;
      
      // Load nav drawer component
      fetch('htmlModules/nav-drawer.html')
        .then(response => response.text())
        .then(html => {
          document.getElementById('navDrawerContainer').innerHTML = html;
        })
        .catch(error => console.error('Error loading nav drawer:', error));
    });
  </script>

  <script type="module">
    // Fixed initialization for Material 3 components and filters
    document.addEventListener('DOMContentLoaded', () => {
      // Import the initializeStackFilterChips function
      import('./rsc/js/stackIconLoader.js').then(module => {
        // Initialize the stack filter chips
        module.initializeStackFilterChips();
      }).catch(err => console.error('Failed to import stackIconLoader:', err));
      
      // Import sorting functions
      import('./rsc/js/gallery-sorting.js').then(module => {
        const { filterProjByTitle, filterByDate } = module;
        
        // Set up sort dropdown event listener
        const sortDropdown = document.getElementById('sortDropdown');
        if (sortDropdown) {
          console.log('Setting up sort dropdown listener');
          
          // Initialize with current value
          sortDropdown.addEventListener('change', (e) => {
            console.log('Sort type changed to:', e.target.value);
            
            // Call the appropriate sort function based on selected value
            switch (e.target.value) {
              case 'title':
                filterProjByTitle();
                break;
              case 'date':
                filterByDate();
                break;
              default:
                console.warn('Unknown sort type:', e.target.value);
            }
          });
        }
      }).catch(err => console.error('Failed to import gallery-sorting:', err));
      
      // Wait a short time to ensure all components are loaded
      setTimeout(() => {
        // Initialize the filter dropdown
        const filterMenu = document.getElementById('projectFilterMenu');
        const filterToggleBtn = document.getElementById('filterToggleBtn');
        const anchorElement = document.getElementById('filterMenuAnchor');
        
        if (filterMenu && filterToggleBtn) {
          console.log('Setting up filter menu interaction');
          
          // Ensure anchor is properly set
          if (anchorElement && filterMenu.getAttribute('anchor') !== anchorElement.id) {
            filterMenu.setAttribute('anchor', anchorElement.id);
          }
          
          // Set up the menu to open when the button is clicked
          filterToggleBtn.addEventListener('click', (e) => {
            e.stopPropagation(); // Prevent event bubbling
            console.log('Filter toggle button clicked');
            
            // Toggle menu's open state
            filterMenu.style.display = filterMenu.style.display === 'none' ? 'block' : 'none';
            console.log('Menu open state:', filterMenu.style.display);
          });
          
          // Close menu when clicking outside
          document.addEventListener('click', (e) => {
            if (!filterMenu.contains(e.target) && e.target !== filterToggleBtn) {
              filterMenu.style.display = 'none';
            }
          });
          
          // Handle checkbox items in menu
          const filterImages = document.getElementById('filterImages');
          const filterMermaid = document.getElementById('filterMermaid');
          
          if (filterImages) {
            filterImages.addEventListener('click', () => {
              filterImages.classList.toggle('selected');
              console.log('Filter by images:', filterImages.classList.contains('selected'));
              
              // Call the global applyAllFilters function if it exists
              if (window.applyAllFilters) {
                window.applyAllFilters();
              } else {
                applyFilters();
              }
            });
          }
          
          if (filterMermaid) {
            filterMermaid.addEventListener('click', () => {
              filterMermaid.classList.toggle('selected');
              console.log('Filter by mermaid:', filterMermaid.classList.contains('selected'));
              
              // Call the global applyAllFilters function if it exists
              if (window.applyAllFilters) {
                window.applyAllFilters();
              } else {
                applyFilters();
              }
            });
          }
          
          // Function to apply image and mermaid filters
          function applyFilters() {
            const hasImagesFilter = filterImages?.classList.contains('selected') || false;
            const hasMermaidFilter = filterMermaid?.classList.contains('selected') || false;
            
            // Get all project cards
            const projectCards = document.querySelectorAll('.project-card');
            
            projectCards.forEach(card => {
              let showCard = true;
              
              // Check image filter
              if (hasImagesFilter) {
                const hasImages = card.querySelector('.image-count-icon')?.style.display !== 'none';
                if (!hasImages) showCard = false;
              }
              
              // Check mermaid filter
              if (hasMermaidFilter && showCard) {
                const hasMermaid = card.querySelector('.mermaid-icon')?.style.display !== 'none';
                if (!hasMermaid) showCard = false;
              }
              
              // Show or hide the card
              card.style.display = showCard ? '' : 'none';
            });
          }
        } else {
          console.error('Filter menu or button not found in DOM');
        }
      }, 100); // Short delay to ensure components are loaded
    });
  </script>
</body>

</html>
