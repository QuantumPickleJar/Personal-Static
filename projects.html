<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Add this script to dynamically set the correct base -->
  <script>
    // Detect if we're on GitHub Pages and set the correct base path
    const isGitHubPages = window.location.hostname.includes('github.io');
    if (isGitHubPages) {
      const basePath = '/Personal-Static/';
      document.write(`<base href="${basePath}">`);
    } else {
      document.write('<base href="/">');
    }
  </script>

  <title>Vincent's Portfolio</title>
  <!-- Material Icons -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <!-- Updated CSS path -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.3/css/lightbox.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.3/js/lightbox.min.js"></script>  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="style.css">
  <script type="module">
  // Dynamically import with absolute path
  const basePath = window.location.hostname.includes('github.io') ? 
    '/Personal-Static/' : '/';
  
  import(`${basePath}rsc/js/projects.js`)
    .catch(err => console.error('Failed to load projects module:', err));
</script>
  <!-- Add Barba.js CDN -->
  <meta http-equiv="Content-Type" content="text/javascript; charset=utf-8">
  <script src="https://unpkg.com/@barba/core"></script>
</head>

<body>
  <!-- Load Navigation Drawer HTML Component -->
  <div id="navDrawerContainer"></div>
  
  <!-- Theme Toggle (shows the dark/light mode slider)-->
  <theme-toggle></theme-toggle>
  
  <!-- Wrap with Barba containers -->
  <div id="barba-wrapper" data-barba="wrapper">
    <div data-barba="container" data-barba-namespace="projects">
      <!-- Header partial -->
      <div id="headerContainer"></div>

      <!-- Main sandwich container -->
      <div class="contentContainer">
        <!-- Sidebar partial -->
        <div id="sidebarContainer"></div>

        <!-- Main Container -->
        <div id="mainContainer">
          <main id="mainContent">
            <!-- New row for how-to and projects per page dropdown -->
            <div id="how-to" class="how-to d-flex align-items-center justify-content-between flex-wrap">
              <p class="mb-0">
                Below are projects that have enough of a footprint to warrant a listing here.<br>
                <strong>Mouseover</strong> descriptions that are truncated, and click to see more info
              </p>
              <div id="perPageContainer" class="per-page-container"></div>
            </div>

            <div id="advancedSearchContainer" class="d-flex align-items-center gap-2 mb-3">
              <div class="d-flex align-items-center gap-2">
                <div>
                  <label for="searchBar" class="visually-hidden">Search Projects:</label>
                  <input type="text" id="searchBar" placeholder="Search Projects..." class="form-control">
                </div>
 
                <!-- filter by dropdown -->
                <div id="projectFilters" style="display: flex; flex-wrap: wrap; gap: 1rem; align-items: center; margin-bottom: 1rem;">
                  <!-- Anchor for menu -->
                  <div id="filterAnchor" style="position: relative;"></div>

                  <!-- Material 3 Menu for filters -->
                  <md-menu anchor="filterAnchor" id="projectFilterMenu">
                    <md-menu-item type="checkbox" id="filterImages">Has Images</md-menu-item>
                    <md-menu-item type="checkbox" id="filterMermaid">Has Mermaid</md-menu-item>
                    <md-divider></md-divider>
                    <div style="padding: 10px; max-width: 250px;">
                      <p style="margin: 0 0 8px;">Filter by Technology:</p>
                      <div id="stackFilterChips" style="display: flex; flex-wrap: wrap; gap: 4px;"></div>
                    </div>
                  </md-menu>
                  
                  <!-- Sort By dropdown remains unchanged -->
                  <md-outlined-select label="Sort By" id="sortDropdown">
                    <md-select-option value="title">
                      <span>Title</span>
                    </md-select-option>
                    <md-select-option value="date">
                      <span>Date</span>
                    </md-select-option>
                  </md-outlined-select>
                  
                  <!-- Filter toggle button -->
                  <md-filled-tonal-button id="filterToggleBtn">Filter Options</md-filled-tonal-button>
                </div>
                
              </div>
              <!-- Inline pagination for larger screens -->
              <div id="inlinePaginationContainer"></div>
            </div>
            <!-- The projects gallery container now includes the loading overlay -->
            <div id="projectsGallery" class="projects-gallery">
              <div id="loadingOverlay">Loading</div>
            </div>

            <!-- Bottom pagination for small screens -->
            <div id="paginationContainer"></div>
          </main>
        </div>
      </div>

      <!-- Footer partial -->
      <div id="footerContainer"></div>

      <!-- Modal for expanded project details -->
      <div id="modalContainer"></div>

      <script type="module">
        // Load the modal HTML
        fetch('htmlModules/project-modal.html')
          .then(response => response.text())
          .then(html => {
            document.getElementById('modalContainer').innerHTML = html;

            // Now that modal is injected, bind close button listener
            const closeButton = document.getElementById('closeModal');
            if (closeButton) {
              closeButton.addEventListener('click', () => {
                document.getElementById('projectModal').style.display = 'none';
              });
            }
          });

      </script>
    </div>
  
    <template id="projectCardTemplate">
      <md-elevated-card data-project-id="" class="project-card">
        <div class="badge-container">
          <span class="academic-label"></span>
          <div class="image-count-icon" style="display: none;">
            <span class="icon">&#128247;</span>
            <span class="count"></span>
          </div>
          <div class="mermaid-icon" style="display: none;">
            <img src="./rsc/images/stack/MermaidJS.png" alt="Has Mermaid Diagram" />
          </div>
        </div>
    
        <!-- <img class="project-thumbnail" src="" alt="Project Thumbnail" /> -->
    
        <div class="project-title"></div>
    
        <span class="short-form-truncated"></span>
    
        <div class="stack-icons"></div>
    
        <div class="carousel-card-footer">
          <md-filled-button class="open-modal-btn">View Project</md-filled-button>
        </div>
      </md-elevated-card>
    </template>
    
  </div>

  <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
  <script>
    mermaid.initialize({ startOnLoad: false });
  </script>
  
  <!-- Transition script -->
  <script src="transition.js"></script>
  
  <!-- Include only the entry point as module -->
  <script type="module" src="main.js"></script>

  <script>
    console.log('projects.html page loaded');
    document.addEventListener('DOMContentLoaded', () => {
      console.log('DOM fully loaded in projects.html');
      window.debugProjectsPage = true;
      
      // Load nav drawer component
      fetch('htmlModules/nav-drawer.html')
        .then(response => response.text())
        .then(html => {
          document.getElementById('navDrawerContainer').innerHTML = html;
        })
        .catch(error => console.error('Error loading nav drawer:', error));
    });
  </script>

  <script type="module">
  // Ensure projects are loaded correctly regardless of base path
  document.addEventListener('DOMContentLoaded', async () => {
    try {
      // Dynamically import with absolute path
      const basePath = window.location.hostname.includes('github.io') ? 
        '/Personal-Static/' : '/';
      
      // Import and initialize projects module
      const projectsModule = await import(`${basePath}rsc/js/projects.js`);
      
      console.log('Projects module loaded successfully');
      
      // Get the gallery element
      const gallery = document.getElementById('projectsGallery');
      if (gallery) {
        // Add loading indicator
        gallery.innerHTML = '<div class="loading">Loading projects...</div>';
        
        // Load and render projects
        const projects = await projectsModule.loadProjects();
        console.log(`Loaded ${projects.length} projects`);
        
        if (projects && projects.length > 0) {
          projectsModule.renderProjectsGallery(projects);
        } else {
          gallery.innerHTML = '<div class="error">No projects found.</div>';
        }
      } else {
        console.error('Projects gallery element not found!');
      }
    } catch (err) {
      console.error('Failed to load or initialize projects:', err);
      const gallery = document.getElementById('projectsGallery');
      if (gallery) {
        gallery.innerHTML = `<div class="error">Failed to load projects: ${err.message}</div>`;
      }
    }
  });
</script>

  <script type="module">
    // Use CDN imports instead of bare specifiers
    import { LitElement } from 'https://esm.sh/lit@2.8.0';
    import 'https://cdn.jsdelivr.net/npm/@material/web/elevated-card/elevated-card.js';
    import 'https://cdn.jsdelivr.net/npm/@material/web/filled-button/filled-button.js';
    import 'https://cdn.jsdelivr.net/npm/@material/web/menu/menu.js';
    import 'https://cdn.jsdelivr.net/npm/@material/web/menu/menu-item.js';
    import 'https://cdn.jsdelivr.net/npm/@material/web/divider/divider.js';
    import 'https://cdn.jsdelivr.net/npm/@material/web/filled-tonal-button/filled-tonal-button.js';
    import 'https://cdn.jsdelivr.net/npm/@material/web/filter-chip/filter-chip.js';
  </script>

  <script type="module" src="rsc/js/theme-toggle.js"></script>
</body>

</html>
