<!DOCTYPE html>
<html lang="en">
<head>
  <base href="/" />
  <script>
    if (window.location.hostname.includes('github.io') || 
        window.location.pathname.includes('Personal-Static')) {
      document.querySelector('base').href = '/Personal-Static/';
    }
  </script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Vincent Morrill — Portfolio</title>

  <!-- Material Design Components -->
  <script type="module" src="https://cdn.jsdelivr.net/npm/@material/web/all.js"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  
  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css" />

  <style>
:root {
  --md-sys-color-primary: #6750A4;
  --md-sys-color-secondary: #03DAC6;
  --md-sys-color-surface: #FFFFFF;
  --md-sys-color-on-surface: #000000;
  --md-sys-color-surface-dark: rgba(25, 25, 25, 0.6);
  --md-sys-color-on-surface-dark: #FFFFFF;
  --card-border-radius: 20px;
  --card-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
  
  /* Index-specific card accent colors */
  --index-card-accent: #3D8BF7;
  --index-card-accent-hover: #1E75E8;
  --index-card-button-bg: #3D8BF7;
  --index-card-button-text: white;
}

body {
  font-family: 'Roboto', sans-serif;
  margin: 0;
  padding: 0;
  background-color: var(--md-sys-color-surface);
  color: var(--md-sys-color-on-surface);
  transition: background-color 0.3s ease, color 0.3s ease;
}

body.dark-mode {
  background: linear-gradient(to bottom right, #1a1a1a, #121212);
  color: var(--md-sys-color-on-surface-dark);
  --index-card-accent: #5E9CF9;
  --index-card-accent-hover: #7EACF9;
  --index-card-button-bg: #5E9CF9;
}

.theme-toggle {
  position: fixed;
  top: 1.5rem;
  right: 1.5rem;
  z-index: 10;
}

.section-heading-container {
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 2rem 0 1.5rem;
  position: relative;
  width: 100%;
}

.section-heading {
  font-size: 2.25rem;
  font-weight: 500;
  margin: 0;
  text-align: center;
}

.toggle-container {
  position: absolute;
  right: 0;
  top: 50%;
  transform: translateY(-50%);
}

.project-title-link {
  transition: color 0.2s ease;
}

.project-title-link:hover {
  color: var(--md-sys-color-secondary);
  text-decoration: underline;
}

/* Special styling for index page project titles */
.home-page .project-title {
  color: var(--index-card-accent);
  font-weight: 600;
  margin-bottom: 0.5rem;
}

.home-page .project-title-link:hover {
  color: var(--index-card-accent-hover);
}

.home-page md-elevated-card {
  border-top: 3px solid var(--index-card-accent);
}

.home-page md-elevated-card:hover {
  border-top-color: var(--index-card-accent-hover);
}

.home-page md-filled-button {
  --md-filled-button-container-color: var(--index-card-button-bg);
  --md-filled-button-label-text-color: var(--index-card-button-text);
}

/* Make home page project cards full width on mobile, horizontal row on desktop */
.home-page.project-card-grid {
  display: grid;
  grid-template-columns: 1fr; /* Default to single column full width */
  gap: 1.5rem;
  padding: 1rem 3rem;
}

/* Media query for desktop view to show all three cards in a row */
@media (min-width: 992px) {
  .home-page.project-card-grid {
    grid-template-columns: repeat(3, 1fr); /* Show all three cards in a row on desktop */
    gap: 2rem;
    padding: 2rem 3rem;
  }
  
  .home-page md-elevated-card.project-card {
    /* Keep consistent card height in desktop row view */
    height: 100%;
    display: flex;
    flex-direction: column;
  }
}

.home-page md-elevated-card.project-card {
  max-width: none;
  width: 100%;
}

/* Ensure short-form description truncates properly */
.home-page .short-form-truncated {
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: normal;
  line-height: 1.5;
  min-height: calc(1.5em * 2); /* Exactly two lines height */
  max-height: calc(1.5em * 2); /* Enforce maximum height */
}

.section-subheading {
  font-size: 1.1rem;
  max-width: 700px;
  margin: 0 auto 2.5rem;
  text-align: center;
  line-height: 1.6;
}

.project-card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 2.5rem;
  padding: 2rem 3rem;
  margin-top: 2rem;
}

md-elevated-card {
  padding: 1.5rem;
  display: flex;
  flex-direction: column;
  border-radius: var(--card-border-radius);
  box-shadow: var(--card-shadow);
  background-color: var(--md-sys-color-surface);
  color: var(--md-sys-color-on-surface);
  transition: all 0.3s ease;
  overflow: hidden;
  height: 100%;
}

md-elevated-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 12px 24px rgba(0, 0, 0, 0.15);
}

body.dark-mode md-elevated-card {
  background-color: rgba(42, 42, 42, 0.8);
  color: var(--md-sys-color-on-surface-dark);
  border: 1px solid rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(10px);
}

.carousel-card {
  display: flex;
  flex-direction: column;
  height: 100%;
}

.carousel-card-header {
  font-weight: 500;
  font-size: 1.4rem;
  margin-bottom: 1rem;
  color: var(--md-sys-color-primary);
}

.carousel-card-body {
  font-size: 1rem;
  line-height: 1.6;
  margin-bottom: 1.5rem;
}

.spacer {
  flex-grow: 1;
}

.carousel-card-footer {
  margin-top: auto;
  padding-top: 1rem;
  display: flex;
  justify-content: flex-end;
}

md-filled-button {
  --md-filled-button-container-color: var(--md-sys-color-primary);
  --md-filled-button-label-text-color: white;
}

.hero-carousel {
  padding: 2rem 2rem 3rem;
  margin-top: 1rem;
}

#carouselContainer {
  width: 92%;
  margin: 1.5rem auto;
  border-radius: var(--card-border-radius);
  overflow: hidden;
  box-shadow: var(--card-shadow);
}

/* Added styles for links */
a {
  color: var(--md-sys-color-primary);
  text-decoration: none;
  transition: color 0.3s;
}

a:hover {
  color: var(--md-sys-color-secondary);
  text-decoration: underline;
}

body.dark-mode a {
  color: #a991f7; /* Lighter purple in dark mode */
}

body.dark-mode a:hover {
  color: var(--md-sys-color-secondary);
}

/* Add these styles to your existing CSS */

/* Base icon text color for light mode */
.stack-item-container {
  color: var(--md-sys-color-on-surface);
}

/* Icon text color for dark mode */
body.dark-mode .stack-item-container {
  color: var(--md-sys-color-on-surface-dark);
}

/* Make sure the stack-label specifically gets the right color */
.stack-label {
  font-size: 0.75rem;
  max-width: 70px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  text-align: center;
  color: inherit; /* Inherit from parent container */
  transition: color 0.3s ease; /* Smooth transition when theme changes */
}

/* Ensure all text elements within stack icons follow the theme */
.stack-icons-container * {
  transition: color 0.3s ease;
}

/* More specific selector for the "more" label */
.more-stack-label {
  color: var(--md-sys-color-on-surface);
  transition: color 0.3s ease, background-color 0.3s ease;
}

body.dark-mode .more-stack-label {
  color: var(--md-sys-color-on-surface-dark);
  background-color: rgba(60, 60, 60, 0.8);
}

@media screen and (max-width: 768px) {
  .section-heading {
    font-size: 1.8rem;
  }

  .section-subheading {
    font-size: 1rem;
    padding: 0 1rem;
  }

  .project-card-grid {
    padding: 1rem;
    gap: 1.25rem;
  }

  md-elevated-card {
    padding: 1rem;
    border-radius: 16px;
  }

  #carouselContainer {
    width: 100%;
    border-radius: 0;
    box-shadow: none;
  }

  .hero-carousel {
    padding: 1.5rem 1rem 2rem;
  }

  .theme-toggle {
    top: 1rem;
    right: 1rem;
  }

  md-filled-button {
    font-size: 0.9rem;
  }

  .carousel-card-header {
    font-size: 1.2rem;
  }

  .carousel-card-body {
    font-size: 0.95rem;
  }

  .home-page.project-card-grid {
    padding: 1rem;
  }
}

  </style>
</head>

<body>
  <!-- Load Navigation Drawer HTML Component -->
  <div id="navDrawerContainer"></div>
  
  <!-- 🌗 Theme Toggle -->
  <theme-toggle></theme-toggle>
  
  <!-- 🗂️ Featured Projects Section - Moved to the top -->
  <section>
    <h2 class="section-heading">Featured Projects</h2>
    <p class="section-subheading">
      Explore some of my highlighted work. Each project demonstrates different skills and technologies.
    </p>
    
  <div class="project-card-grid"> 
      <!-- Cards will be dynamically injected here -->
    </div>
  </section>

  <!-- 🖼️ Hero Section (Carousel) - Moved below -->
  <section class="hero-carousel">
    <div class="section-heading-container">
      <h2 class="section-heading">Project Showcase</h2>
      <div class="toggle-container">
        <!-- 📷/📊 Project Type Toggle -->
        <project-type-toggle></project-type-toggle>
      </div>
    </div>
    
    <p class="section-subheading">
      Visual examples of my work. For a complete collection,
      visit the <a href="projects.html">full project gallery</a>.
    </p>

    <div id="carouselContainer" class="carousel slide" data-bs-ride="carousel">
      <div class="carousel-inner"></div>
    </div>
  </section>

  <!-- 🧩 Custom Scripts -->
  <script>
    // Load nav drawer component
    document.addEventListener('DOMContentLoaded', function() {
      fetch('htmlModules/nav-drawer.html')
        .then(response => response.text())
        .then(html => {
          document.getElementById('navDrawerContainer').innerHTML = html;
        })
        .catch(error => console.error('Error loading nav drawer:', error));
    });
  </script>
  <script type="module" src="main.js"></script>
  <script type="module" src="rsc/js/carousel.js"></script>
  <script type="module" src="./rsc/js/theme-toggle.js"></script>
  <script type="module" src="./rsc/js/project-toggle.js"></script>
  <!-- Add Bootstrap if not already included -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
