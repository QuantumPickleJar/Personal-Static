<!DOCTYPE html>
<html lang="en">
<head>
  <base href="/" />
  <script>
    if (window.location.hostname.includes('github.io') || 
        window.location.pathname.includes('Personal-Static')) {
      document.querySelector('base').href = '/Personal-Static/';
    }
  </script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Vincent Morrill — Portfolio</title>

  <!-- Material Design Components -->
  <script type="module" src="https://cdn.jsdelivr.net/npm/@material/web/all.js"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap">
  
  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css" />

  <style>
:root {
  --md-sys-color-primary: #6750A4;
  --md-sys-color-secondary: #03DAC6;
  --md-sys-color-surface: #FFFFFF;
  --md-sys-color-on-surface: #000000;
  --md-sys-color-surface-dark: rgba(25, 25, 25, 0.6);
  --md-sys-color-on-surface-dark: #FFFFFF;
}

body {
  font-family: 'Roboto', sans-serif;
  margin: 0;
  padding: 0;
  background-color: var(--md-sys-color-surface);
  color: var(--md-sys-color-on-surface);
  transition: background-color 0.3s ease, color 0.3s ease;
}

body.dark-mode {
  background: linear-gradient(to bottom right, #1a1a1a, #121212);
  color: var(--md-sys-color-on-surface-dark);
}

.theme-toggle {
  position: fixed;
  top: 1rem;
  right: 1rem;
  z-index: 10;
}

.hero-carousel {
  padding: 3rem 2rem 2rem;
  text-align: center;
}

.hero-carousel h2 {
  font-size: 2.25rem;
  margin-bottom: 0.75rem;
}

.hero-carousel p {
  font-size: 1.1rem;
  max-width: 700px;
  margin: 0 auto 2rem;
}

.project-card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 2rem;
  padding: 2rem;
}

md-elevated-card {
  padding: 1rem;
  display: flex;
  flex-direction: column;
  border-radius: 16px;
  backdrop-filter: blur(8px);
  background-color: var(--md-sys-color-surface);
  transition: background-color 0.3s ease;
}

body.dark-mode md-elevated-card {
  background-color: var(--md-sys-color-surface-dark);
  border: 1px solid rgba(255, 255, 255, 0.1);
}

.carousel-card-header {
  font-weight: bold;
  font-size: 1.2rem;
  margin-bottom: 0.5rem;
}

.carousel-card-body {
  flex-grow: 1;
  margin-bottom: 1rem;
  font-size: 0.95rem;
}

.carousel-card-footer {
  display: flex;
  justify-content: flex-end;
}

  </style>
</head>

<body>
  <!-- 🌗 Theme Toggle -->
  <theme-toggle></theme-toggle>

  <!-- 🖼️ Hero Section (Carousel + Welcome) -->
  <section class="hero-carousel">
    <h2>Welcome to Vincent's Portfolio</h2>
    <p>
      Explore my technical journey through software paradigms, design patterns, and experimental UI work.
      You can also check out the <a href="projects.html">full project gallery</a>.
    </p>

    <div id="carouselContainer" class="carousel slide" data-bs-ride="carousel">
      <div class="carousel-inner"></div>
    </div>
  </section>

  <!-- 🗂️ Project Preview Cards (Optional Static Display Here) -->
  <section class="project-card-grid">
    <md-elevated-card>
      <div class="carousel-card">
        <div class="carousel-card-header">Example Project</div>
        <div class="carousel-card-body">Short description of the project or tech stack.</div>
        <div class="carousel-card-footer">
          <md-filled-button>View Project</md-filled-button>
        </div>
      </div>
    </md-elevated-card>
  </section>

  <!-- 🧩 Custom Scripts -->
  <script type="module" src="main.js"></script>
  <script type="module" src="rsc/js/carousel.js"></script>
  <script type="module" src="./rsc/js/theme-toggle.js"></script>
</body>
</html>
