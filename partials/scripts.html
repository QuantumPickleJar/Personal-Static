<script src="https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
<script>
  const RESUME_PDF_URL = 'rsc/docs/resume.pdf?v=2026-02-16-latest';

  // PDF.js modal rendering state
  let pdfRendered = false;  // track if we’ve already rendered
  let pdfDoc = null;       // PDF document instance
  let pdfScale = 1.2;      // current zoom scale
  let renderTask = null;    // current PDF.js render task

  // Helper to render page into canvas
  async function renderPdfPage() {
    const canvas = document.getElementById('pdfCanvas');
    const ctx = canvas.getContext('2d');
    const page = await pdfDoc.getPage(1);
    // include page rotation for correct orientation
    const viewport = page.getViewport({ scale: pdfScale, rotation: page.rotate });
    canvas.width = viewport.width;
    canvas.height = viewport.height;
    // cancel any ongoing render
    if (renderTask) {
      try { renderTask.cancel(); } catch (e) { /* ignore if already finished */ }
    }
    // reset and clear canvas
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    // start new render task
    renderTask = page.render({ canvasContext: ctx, viewport });
    await renderTask.promise;
  }
  // Delegate PDF modal open/close, rendering, and zoom via PDF.js
  document.body.addEventListener('click', async e => {
    const btn = e.target.closest('#viewResumeBtn');
    if (btn) {
      e.preventDefault();
      const modal = document.getElementById('pdfModal');
      const canvas = document.getElementById('pdfCanvas');
      const loading = document.getElementById('loadingPdf');
      const notice = document.getElementById('pdfjs-notice');
      if (!modal || !canvas) return;
      modal.classList.add('open');
      // attach zoom handlers once
      document.getElementById('zoomIn').onclick = () => { pdfScale += 0.2; renderPdfPage(); };
      document.getElementById('zoomOut').onclick = () => { pdfScale = Math.max(0.5, pdfScale - 0.2); renderPdfPage(); };
      if (!pdfRendered) {
        canvas.style.display = 'none';
        if (loading) loading.style.display = '';
        if (notice) notice.style.display = 'none';
        try {
          pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.worker.min.js';
          pdfDoc = await pdfjsLib.getDocument(RESUME_PDF_URL).promise;
          loading && (loading.style.display = 'none');
          await renderPdfPage();
          canvas.style.display = '';
          pdfRendered = true;
        } catch (err) {
          loading && (loading.style.display = 'none');
          notice && (notice.style.display = '');
          window.open(RESUME_PDF_URL, '_blank', 'noopener');
        }
      } else {
        // already rendered: just show canvas
        if (loading) loading.style.display = 'none';
        if (notice) notice.style.display = 'none';
        canvas.style.display = '';
      }
    }
  });
  // Close modal when clicking close button or backdrop
  document.body.addEventListener('click', e => {
    if (e.target.matches('.close-button') || e.target.id === 'pdfModal') {
      e.preventDefault();
      const modal = document.getElementById('pdfModal');
      if (modal) modal.classList.remove('open');
    }
  });
</script>
<script src="main.bundle.js"></script>
